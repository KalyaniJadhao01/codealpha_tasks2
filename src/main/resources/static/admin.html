<!DOCTYPE html>
<html>

<head>

    <title>Admin Panel</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Admin Panel</h1>

<div class="event-card">

    <input
            id="title"
            placeholder="Title">

    <input
            id="description"
            placeholder="Description">

    <input
            id="location"
            placeholder="Location">

    <input
            id="date"
            type="datetime-local">

    <input
            id="capacity"
            type="number"
            placeholder="Capacity">

    <button id="createBtn">

        Create Event

    </button>

</div>


<h2>Events</h2>

<div id="events-container">

</div>


<script src="admin.js"></script>

</body>

</html>
